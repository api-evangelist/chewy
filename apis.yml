aid: chewy
name: Chewy
x-type: company
description: >-
  Chewy, Inc. is a Fortune 500 American online retailer of pet food,
  pet products, prescription medications, and veterinary services
  headquartered in Plantation, Florida. Chewy is one of the largest
  e-commerce pet retailers in the United States and supports a
  customer-focused operating model centered on subscription Autoship
  orders, Chewy Pharmacy prescription fulfillment, Connect with a Vet
  telehealth, and Chewy Health insurance. Chewy provides vendor and
  supplier integration primarily through the Dsco supplier integration
  platform rather than a public consumer-facing developer API. The
  Dsco-based integration supports core EDI transactions for purchase
  orders, inventory updates, shipment confirmations, and invoices,
  enabling brands and third-party logistics providers to connect with
  Chewy's e-commerce marketplace.
