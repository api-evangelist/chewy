aid: chewy
url: https://raw.githubusercontent.com/api-evangelist/chewy/refs/heads/main/apis.yml
apis:
  - aid: chewy:vendor-integration-api
    name: Chewy Vendor Integration API
    tags:
      - Pet Retail
      - E-Commerce
      - EDI
      - Vendor Integration
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.dsco.io
    humanURL: https://www.chewy.com
    properties:
      - url: https://www.chewy.com
        type: Documentation
    description: >-
      Chewy provides vendor and supplier integration through the DSCO
      platform, enabling third-party brands and logistics providers to
      connect with Chewy's e-commerce marketplace. The integration supports
      EDI transactions including purchase orders (850), inventory updates
      (846), shipment confirmations (856), and invoices (810). Vendors
      authenticate using API tokens and supplier account credentials
      provided through the DSCO platform.
